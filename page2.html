<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Q3 Skills Test</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: url("https://images.unsplash.com/photo-1535909339361-9b3a8f6e2c5f") no-repeat center center/cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .glass-card {
            width: 750px;
            background: rgba(0, 170, 200, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            color: white;
        }

        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
        }

        .btn-custom {
            background-color: #00c6d7;
            color: white;
        }

        .btn-custom:hover {
            background-color: #009cab;
        }

        input, select {
            margin-bottom: 10px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .output-box {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="glass-card">

    <h2>REGISTRATION</h2>

    <div class="row">
        
        <!-- LEFT SIDE -->
        <div class="col-md-4 text-center">
            <img src="https://via.placeholder.com/150" class="profile-pic" id="preview">
            <input type="file" class="form-control mt-3" onchange="previewImage(event)">
        </div>

        <!-- RIGHT SIDE -->
        <div class="col-md-8">

            <input type="text" id="fname" class="form-control" placeholder="First Name">
            <input type="text" id="lname" class="form-control" placeholder="Last Name">
            <input type="number" id="age" class="form-control" placeholder="Age">
            <input type="email" id="email" class="form-control" placeholder="Email">
            <input type="password" id="password" class="form-control" placeholder="Password">

            <button class="btn btn-custom w-100 mt-2" onclick="register()">
                Create My Account
            </button>

            <button class="btn btn-light w-100 mt-2">
                Cancel
            </button>

            <div class="output-box text-center" id="output">
                Output will appear here...
            </div>

        </div>
    </div>

</div>

<script>

    // Preview uploaded image
    function previewImage(event) {
        document.getElementById("preview").src =
            URL.createObjectURL(event.target.files[0]);
    }

    // Registration function
    function register() {

        // Data types
        let firstName = document.getElementById("fname").value; // string
        let lastName = document.getElementById("lname").value;  // string
        let age = parseInt(document.getElementById("age").value); // number
        let email = document.getElementById("email").value; // string
        let passwordLength = document.getElementById("password").value.length; // number

        let isMinor = age < 18; // boolean operator

        // Condition
        if (firstName === "" || lastName === "" || isNaN(age)) {
            document.getElementById("output").innerHTML =
                "Please complete all required fields.";
        } else {

            document.getElementById("output").innerHTML =
                "<strong>Registration Successful!</strong><br>" +
                "Full Name: " + firstName + " " + lastName + "<br>" +
                "Age: " + age + "<br>" +
                "Minor: " + isMinor + "<br>" +
                "Password Length: " + passwordLength;
        }
    }

</script>

</body>
</html>
